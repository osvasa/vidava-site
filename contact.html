<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact Us — VIDAVA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  /* LEGAL / CONTACT PAGES */
  .page-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 40px 80px;
  }
  .page-back {
    position: fixed;
    top: 20px; left: 40px;
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 201;
    transition: color 0.2s, border-color 0.2s;
    font-family: inherit;
    text-decoration: none;
    display: inline-block;
  }
  .page-back:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
  .page-title {
    font-size: 36px;
    font-weight: 900;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .page-updated {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 40px;
  }
  .page-section {
    margin-bottom: 32px;
  }
  .page-section h3 {
    font-size: 18px;
    font-weight: 700;
    color: #00e5cc;
    margin-bottom: 10px;
  }
  .page-section p, .page-section li {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    line-height: 1.8;
  }
  .page-section a {
    color: #00e5cc;
    text-decoration: none;
  }
  .page-section a:hover { text-decoration: underline; }

  /* CONTACT FORM */
  .contact-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
  }
  .contact-email {
    font-size: 20px;
    font-weight: 700;
    color: #00e5cc;
    margin-bottom: 4px;
  }
  .contact-email a { color: #00e5cc; text-decoration: none; }
  .contact-email a:hover { text-decoration: underline; }
  .contact-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 15px;
    color: #fff;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: #00e5cc;
  }
  .form-textarea {
    min-height: 120px;
    resize: vertical;
  }
  .form-btn {
    background: #FFD932;
    color: #222;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .form-btn:hover { background: #e6c320; }
  .form-success {
    display: none;
    padding: 14px 20px;
    background: rgba(0,229,204,0.1);
    border: 1px solid rgba(0,229,204,0.3);
    border-radius: 8px;
    font-size: 14px;
    color: #00e5cc;
    margin-top: 16px;
  }

  @media (max-width: 680px) {
    .page-inner { padding: 80px 20px 60px; }
    .page-title { font-size: 28px; }
    .page-back { left: 20px; }
    .contact-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<a class="page-back" href="https://vidava.ai">Back</a>
<div class="page-inner">
    <h2 class="page-title">Contact Us</h2>
    <div class="page-updated">We'd love to hear from you.</div>

    <div class="contact-card">
      <div class="contact-email"><a href="mailto:hello@vidava.ai">hello@vidava.ai</a></div>
      <div class="contact-sub">We typically respond within 24 hours.</div>
    </div>

    <div class="page-section">
      <h3>Send Us a Message</h3>
      <form id="contact-form" onsubmit="submitContact(event)">
        <div class="form-group">
          <label class="form-label" for="contact-name">Name</label>
          <input class="form-input" id="contact-name" type="text" placeholder="Your name" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="contact-email">Email</label>
          <input class="form-input" id="contact-email" type="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="contact-subject">Subject</label>
          <select class="form-input" id="contact-subject">
            <option>General Question</option>
            <option>Bug Report</option>
            <option>Feature Request</option>
            <option>Account / Data Deletion</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="contact-message">Message</label>
          <textarea class="form-textarea" id="contact-message" placeholder="How can we help?" required></textarea>
        </div>
        <button class="form-btn" type="submit">Send Message</button>
        <div class="form-success" id="form-success">Message sent! We'll get back to you soon.</div>
      </form>
    </div>
  </div>

<script>
function submitContact(e) {
  e.preventDefault();
  var name = document.getElementById('contact-name').value;
  var email = document.getElementById('contact-email').value;
  var subject = document.getElementById('contact-subject').value;
  var message = document.getElementById('contact-message').value;
  console.log('Contact form submitted:', { name: name, email: email, subject: subject, message: message });
  document.getElementById('form-success').style.display = 'block';
  document.getElementById('contact-form').reset();
}
</script>
</body>
</html>
